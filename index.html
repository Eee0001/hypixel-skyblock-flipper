<!doctype html>
<html>
  <head>

    <title>Hypixel Skyblock Flipper V.2.01</title>

    <link rel="stylesheet" href="css/main.css">
    
  </head>
  <body>

    <section id="main">
      <div id="toggle-menu-btn"></div>
    </section>

    <section id="menu">
      <span>Weight Values</span>
      
      <hr>
      
      <label for="WeightCoins">Coins       :</label>
      <input id="WeightCoins" type="number">
      <label for="WeightNorthStars">North Stars :</label>
      <input id="WeightNorthStars" type="number">
      <label for="WeightGems">Gems        :</label>
      <input id="WeightGems" type="number">
      <label for="WeightBits">Bits        :</label>
      <input id="WeightBits" type="number">
      <label for="WeightCopper">Copper      :</label>
      <input id="WeightCopper" type="number">
      <label for="WeightChocolate">Chocolate   :</label>
      <input id="WeightChocolate" type="number">
      <label for="WeightTime">Time        :</label>
      <input id="WeightTime" type="number">
      
      <hr><br>
      
      <span>Data</span>
      
      <hr>
      
      <label for="DataBazaar">Get Bazaar   :</label>
      <input id="DataBazaar" type="button" value="Fetch">
      <label for="DataAuctions">Get Auctions :</label>
      <!-- <input id="DataAuctions" type="button" value="Fetch"> -->
      
      <hr><br>
      
      <span>Flipper</span>
      
      <hr>
      
      <label for="FlipperSorting">Sorting Method  :</label>
      <select id="FlipperSorting">
        <option value="1">High/Low</option>
        <option value="-1">Low/High</option>
      </select>
      <label for="FlipperCalculate">Calculate Flips :</label>
      <input id="FlipperCalculate" type="button" value="Calculate">
      
      <hr>
      
    </section>

    <!-- SCRIPTS -->
    <script src="js/menu.js"></script>
    <!-- SCRIPTS -->
    
    <script src="js/main.js"></script>
    
  </body>
</html>
