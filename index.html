<!doctype html>
<html>
  <head>

    <title>Hypixel Skyblock Flipper V.2.01</title>

    <link rel="stylesheet" href="css/main.css">
    
  </head>
  <body>

    <section id="main">
      <div id="toggle-menu-btn"></div>
    </section>

    <section id="menu">
      <span>Weights</span>
      
      <hr>
      
      <label for="WeightActive">Active Weight :</label>
      <select id="WeightActive"></select>
      
      <label for="WeightValue">Active Value  :</label>
      <input id="WeightValue" type="number">
      
      <br>
      
      <label for="WeightList">Weights List  :</label>
      <input id="WeightList" type="button" value="View">
      
      <br>
      
      <label for="WeightReset">Reset Weights :</label>
      <input id="WeightReset" type="button" value="Reset">
      
      <hr><br>
      
      <span>Flipper</span>
      
      <hr>
      
      <label for="FlipperCalculate">Calculate Flips :</label>
      <input id="FlipperCalculate" type="button" value="Calculate">
      
      <hr>
      
    </section>

    <!-- SCRIPTS -->
    <script src="js/utils.js"></script>
    <script src="js/weights.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/bazaar.js"></script>
    <script src="js/data.js"></script>
    <script src="js/flipper.js"></script>
    <script src="js/menu.js"></script>
    <!-- SCRIPTS -->
    
    <script src="js/main.js"></script>
    
  </body>
</html>
